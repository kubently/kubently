name: Publish NPM Package

on:
  push:
    tags:
      - 'cli-v*.*.*'  # Triggers on tags like cli-v2.1.2
  workflow_dispatch:  # Allow manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5 (required for OIDC trusted publishing).
          # No registry-url: it writes an .npmrc authToken entry (placeholder when the
          # secret is absent) that preempts OIDC. No manual npm upgrade: in-place
          # `npm install -g npm@latest` corrupts the toolcache npm (missing sigstore).
          node-version: '24'

      - name: Install dependencies
        working-directory: kubently-cli/nodejs
        run: npm ci

      - name: Run tests
        working-directory: kubently-cli/nodejs
        run: npm test

      - name: Build
        working-directory: kubently-cli/nodejs
        run: npm run build

      # Auth via npm Trusted Publishing (OIDC) — no token/secret needed.
      # One-time setup: npmjs.com -> @kubently/cli -> Settings -> Trusted Publisher
      # (GitHub Actions: kubently/kubently, workflow publish-npm.yml)
      - name: Publish to npm
        working-directory: kubently-cli/nodejs
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: CLI ${{ github.ref }}
          body: |
            ## Kubently CLI Release

            Published to npm as [@kubently/cli](https://www.npmjs.com/package/@kubently/cli)

            ### Installation
            ```bash
            npm install -g @kubently/cli
            ```

            See [CHANGELOG.md](kubently-cli/nodejs/CHANGELOG.md) for details.
          draft: false
          prerelease: false
